services:
  rustpulse:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rustpulse
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      - postgres
    restart: unless-stopped

  postgres:
    image: postgres:16
    container_name: rustpulse-postgres
    environment:
      POSTGRES_DB: rustpulse
      POSTGRES_USER: rustpulse
      POSTGRES_PASSWORD: rustpulse_dev_pw
    ports:
      - "5432:5432"
    volumes:
      - rustpulse_pg:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  rustpulse_pg:
